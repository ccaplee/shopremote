pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.5.0" apply false
    id "org.jetbrains.kotlin.android" version "2.1.21" apply false
}

include ":app"

// AGP 8.5+ requires namespace in all modules.
// Auto-inject namespace for third-party plugins that lack it (e.g. external_path).
// Placed in settings.gradle (not build.gradle) to avoid afterEvaluate timing conflicts
// with evaluationDependsOn(':app') and Flutter's build.gradle upgrader.
gradle.beforeProject { project ->
    project.pluginManager.withPlugin('com.android.library') {
        def manifestFile = project.file("src/main/AndroidManifest.xml")
        if (manifestFile.exists()) {
            def manifest = new groovy.xml.XmlSlurper().parse(manifestFile)
            def pkg = manifest.@package.toString()
            if (pkg && !pkg.isEmpty()) {
                project.android.namespace = pkg
            }
        }
    }
}
