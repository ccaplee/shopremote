# ============================================================
# ShopRemote - GitHub Actions 빌드 워크플로우
# Windows(.exe) + macOS(.dmg) + Android(.apk) 자동 빌드
# bridge 파일은 RustDesk 1.4.6 원본에서 가져와 repo에 포함
# ============================================================

name: ShopRemote Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.22.3"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  CARGO_NDK_VERSION: "3.0.0"
  NDK_VERSION: "r27c"

jobs:
  # ──────────────────────────────────────────
  # Windows 빌드
  # ──────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg 캐시 설정
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-build

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: LLVM 설치
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: vcpkg 설치
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg integrate install
          # --classic 플래그로 manifest 모드 비활성화
          .\vcpkg install openssl libyuv libvpx `
            --triplet x64-windows-static `
            --classic

      - name: Flutter 의존성
        working-directory: flutter
        run: |
          sed -i 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get

      - name: Windows 빌드
        working-directory: flutter
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: flutter build windows --release

      - name: 빌드 결과물 압축
        run: |
          Compress-Archive -Path flutter\build\windows\x64\runner\Release\* -DestinationPath ShopRemote-${{ env.VERSION }}-windows-x64.zip

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Windows
          path: ShopRemote-*.zip

  # ──────────────────────────────────────────
  # macOS 빌드
  # ──────────────────────────────────────────
  build-macos:
    name: macOS Build
    runs-on: macos-13
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg 캐시 설정
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-build

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 의존성 설치
        run: brew install llvm pkg-config nasm yasm

      - name: vcpkg 설치
        run: |
          git clone https://github.com/microsoft/vcpkg.git $HOME/vcpkg
          cd $HOME/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.sh -disableMetrics
          ./vcpkg install openssl:x64-osx libyuv:x64-osx libvpx:x64-osx

      - name: Flutter 의존성
        working-directory: flutter
        run: |
          sed -i '' 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get

      - name: macOS 빌드
        working-directory: flutter
        env:
          VCPKG_ROOT: ${{ env.HOME }}/vcpkg
        run: flutter build macos --release

      - name: DMG 패키징
        run: |
          brew install create-dmg
          APP="flutter/build/macos/Build/Products/Release/shopremote.app"
          create-dmg \
            --volname "ShopRemote" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "ShopRemote-${{ env.VERSION }}-macos.dmg" "$APP" || \
          zip -r "ShopRemote-${{ env.VERSION }}-macos.zip" "$APP"

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-macOS
          path: |
            ShopRemote-*.dmg
            ShopRemote-*.zip

  # ──────────────────────────────────────────
  # Android 빌드
  # ──────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-22.04
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-build

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Android NDK 설치
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: cargo-ndk 설치
        run: cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}" --locked

      - name: 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake

      - name: Flutter 의존성
        working-directory: flutter
        run: |
          sed -i 's/extended_text: 14.0.0/extended_text: 13.0.0/g' pubspec.yaml
          flutter pub get

      - name: Android Rust 라이브러리 빌드
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: |
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86_64 -o flutter/android/app/src/main/jniLibs build --release

      - name: Android APK 빌드
        working-directory: flutter
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: flutter build apk --release --split-per-abi

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Android
          path: flutter/build/app/outputs/flutter-apk/app-*-release.apk
