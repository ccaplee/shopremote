# ============================================================
# ShopRemote - GitHub Actions 빌드 워크플로우
# Windows / macOS / Android
# ============================================================

name: ShopRemote Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: "stable"
  FLUTTER_VERSION: "3.24.5"
  VERSION: "1.4.6"
  CARGO_NDK_VERSION: "3.0.0"
  NDK_VERSION: "r27c"

jobs:
  # ──────────────────────────────────────────
  # macOS 빌드
  # ──────────────────────────────────────────
  build-macos:
    name: macOS Build
    runs-on: macos-13
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-v6

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 시스템 의존성 설치
        run: |
          brew install nasm yasm pkg-config llvm opus aom libvpx

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: Rust 라이브러리 빌드
        env:
          LIBCLANG_PATH: /usr/local/opt/llvm/lib
          LIBRARY_PATH: /usr/local/lib
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        run: cargo build --release --features flutter

      - name: .so → .dylib 심볼릭 링크
        run: |
          ls target/release/lib*.dylib || ls target/release/lib*.so || echo "파일 목록:"
          ls target/release/ | grep -E '\.dylib|\.so'

      - name: macOS Flutter 빌드
        working-directory: flutter
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        run: flutter build macos --release

      - name: DMG 패키징
        run: |
          brew install create-dmg
          APP="flutter/build/macos/Build/Products/Release/shopremote.app"
          if [ ! -d "$APP" ]; then
            APP=$(find flutter/build/macos -name "*.app" | head -1)
          fi
          echo "앱 경로: $APP"
          create-dmg \
            --volname "ShopRemote" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "ShopRemote-${{ env.VERSION }}-macos.dmg" "$APP" || \
          tar czf "ShopRemote-${{ env.VERSION }}-macos.tar.gz" "$APP"

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-macOS
          path: |
            ShopRemote-*.dmg
            ShopRemote-*.tar.gz

  # ──────────────────────────────────────────
  # Android 빌드
  # ──────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-22.04
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-v6

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Android NDK 설치
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: cargo-ndk 설치
        run: cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}" --locked

      - name: 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libclang-dev clang cmake nasm \
            libopus-dev libaom-dev \
            libssl-dev pkg-config

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: opus 크로스컴파일 (Android용)
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
          mkdir -p /tmp/vcpkg-android/installed/{arm64-android,arm-android,x64-android}/{lib,include}

          wget -q https://downloads.xiph.org/releases/opus/opus-1.5.2.tar.gz
          tar xf opus-1.5.2.tar.gz

          build_opus() {
            local ARCH=$1 ABI=$2 TRIPLET=$3
            echo "=== Building opus for $ARCH ==="
            cp -r opus-1.5.2 opus-build-$ARCH && cd opus-build-$ARCH

            export CC=$TOOLCHAIN/bin/${ABI}21-clang
            export CXX=$TOOLCHAIN/bin/${ABI}21-clang++
            export AR=$TOOLCHAIN/bin/llvm-ar
            export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
            export STRIP=$TOOLCHAIN/bin/llvm-strip

            cmake -DCMAKE_TOOLCHAIN_FILE=$NDK/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ARCH \
              -DANDROID_PLATFORM=android-21 \
              -DCMAKE_BUILD_TYPE=Release \
              -DOPUS_BUILD_SHARED_LIBRARY=OFF \
              -DOPUS_BUILD_TESTING=OFF \
              -DCMAKE_INSTALL_PREFIX=/tmp/opus-$ARCH \
              . && cmake --build . -j$(nproc) && cmake --install .

            cd ..
            cp /tmp/opus-$ARCH/lib/libopus.a /tmp/vcpkg-android/installed/$TRIPLET/lib/ || \
            find /tmp/opus-$ARCH -name "libopus.a" -exec cp {} /tmp/vcpkg-android/installed/$TRIPLET/lib/ \;
            cp -r /tmp/opus-$ARCH/include/. /tmp/vcpkg-android/installed/$TRIPLET/include/ 2>/dev/null || \
            find /tmp/opus-$ARCH -name "opus" -type d -exec cp -r {}/* /tmp/vcpkg-android/installed/$TRIPLET/include/ \;
            echo "Done: $ARCH -> $(ls /tmp/vcpkg-android/installed/$TRIPLET/lib/)"
          }

          build_opus arm64-v8a   aarch64-linux-android  arm64-android
          build_opus armeabi-v7a armv7a-linux-androideabi arm-android
          build_opus x86_64      x86_64-linux-android   x64-android

          echo "opus 크로스컴파일 완료"

      - name: Android Rust 라이브러리 빌드
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          VCPKG_ROOT: /tmp/vcpkg-android
        run: |
          cargo ndk \
            -t armeabi-v7a \
            -t arm64-v8a \
            -t x86_64 \
            -o flutter/android/app/src/main/jniLibs \
            build --release --features flutter,mediacodec

      - name: Android APK 빌드
        working-directory: flutter
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: flutter build apk --release --split-per-abi

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Android
          path: flutter/build/app/outputs/flutter-apk/app-*-release.apk

  # ──────────────────────────────────────────
  # Windows 빌드
  # ──────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Rust 캐시
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-v6

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: LLVM 설치
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0.6"

      - name: nasm 설치
        run: choco install nasm -y

      - name: vcpkg 캐시
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: C:\vcpkg-shopremote
          key: vcpkg-win-x64-opus-vpx-yuv-ssl-aom-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win-x64-opus-vpx-yuv-ssl-aom-

      - name: vcpkg 설치
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg-shopremote
          cd C:\vcpkg-shopremote
          git checkout 120deac3062162151622ca4860575a33844ba10b
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg install opus libvpx libyuv openssl aom --triplet x64-windows-static --classic

      - name: vcpkg 환경변수 설정
        run: echo "VCPKG_ROOT=C:\vcpkg-shopremote" >> $env:GITHUB_ENV

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: Rust 라이브러리 빌드
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: cargo build --release --features flutter

      - name: Windows Flutter 빌드
        working-directory: flutter
        env:
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: flutter build windows --release

      - name: 빌드 결과물 압축
        run: |
          Compress-Archive -Path flutter\build\windows\x64\runner\Release\* -DestinationPath ShopRemote-${{ env.VERSION }}-windows-x64.zip

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Windows
          path: ShopRemote-*.zip
