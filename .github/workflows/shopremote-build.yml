# ============================================================
# ShopRemote - GitHub Actions 빌드 워크플로우
# Windows(.exe) + macOS(.dmg) + Android(.apk) 자동 빌드
# 수동 실행: Actions 탭 → shopremote-build → Run workflow
# ============================================================

name: ShopRemote Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.22.3"
  FLUTTER_RUST_BRIDGE_VERSION: "1.80.1"
  CARGO_EXPAND_VERSION: "1.0.95"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  CARGO_NDK_VERSION: "3.0.0"
  NDK_VERSION: "r27c"

jobs:
  # ──────────────────────────────────────────
  # Step 1: Flutter-Rust Bridge 코드 생성
  # (Linux에서 생성 후 다른 플랫폼에서 재사용)
  # ──────────────────────────────────────────
  generate-bridge:
    name: Generate Bridge
    runs-on: ubuntu-22.04
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 의존성 설치
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake curl gcc git g++ \
            libclang-dev libgtk-3-dev llvm-dev \
            nasm ninja-build pkg-config wget

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-unknown-linux-gnu
          components: rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: bridge-ubuntu

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Bridge 코드 생성
        run: |
          cargo install cargo-expand --version ${{ env.CARGO_EXPAND_VERSION }} --locked
          cargo install flutter_rust_bridge_codegen --version ${{ env.FLUTTER_RUST_BRIDGE_VERSION }} --features "uuid" --locked
          pushd flutter && flutter pub get && popd
          ~/.cargo/bin/flutter_rust_bridge_codegen \
            --rust-input ./src/flutter_ffi.rs \
            --dart-output ./flutter/lib/generated_bridge.dart \
            --c-output ./flutter/macos/Runner/bridge_generated.h
          cp ./flutter/macos/Runner/bridge_generated.h ./flutter/ios/Runner/bridge_generated.h

      - name: Bridge Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: bridge-artifact
          path: |
            ./src/bridge_generated.rs
            ./src/bridge_generated.io.rs
            ./flutter/lib/generated_bridge.dart
            ./flutter/lib/generated_bridge.freezed.dart
            ./flutter/macos/Runner/bridge_generated.h
            ./flutter/ios/Runner/bridge_generated.h

  # ──────────────────────────────────────────
  # Step 2-A: Windows 빌드
  # ──────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    needs: generate-bridge
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bridge 파일 복원
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: vcpkg 캐시 설정
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: windows-build

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: LLVM 설치
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: vcpkg 설치
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          .\bootstrap-vcpkg.bat -disableMetrics
          .\vcpkg integrate install
          .\vcpkg install openssl:x64-windows-static libyuv:x64-windows-static libvpx:x64-windows-static

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: Windows 빌드
        working-directory: flutter
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}\bin
        run: flutter build windows --release

      - name: 빌드 결과물 압축
        run: |
          Compress-Archive -Path flutter\build\windows\x64\runner\Release\* -DestinationPath ShopRemote-${{ env.VERSION }}-windows-x64.zip

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Windows
          path: ShopRemote-*.zip

  # ──────────────────────────────────────────
  # Step 2-B: macOS 빌드
  # ──────────────────────────────────────────
  build-macos:
    name: macOS Build
    runs-on: macos-13
    needs: generate-bridge
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bridge 파일 복원
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: vcpkg 캐시 설정
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: macos-build

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 의존성 설치
        run: |
          brew install llvm pkg-config nasm yasm

      - name: vcpkg 설치
        run: |
          git clone https://github.com/microsoft/vcpkg.git $HOME/vcpkg
          cd $HOME/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.sh -disableMetrics
          ./vcpkg install openssl:x64-osx libyuv:x64-osx libvpx:x64-osx

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: macOS 빌드
        working-directory: flutter
        env:
          VCPKG_ROOT: ${{ env.HOME }}/vcpkg
        run: flutter build macos --release

      - name: DMG 패키징
        run: |
          brew install create-dmg
          APP_PATH="flutter/build/macos/Build/Products/Release/shopremote.app"
          create-dmg \
            --volname "ShopRemote" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "ShopRemote-${{ env.VERSION }}-macos.dmg" \
            "$APP_PATH" || \
          zip -r "ShopRemote-${{ env.VERSION }}-macos.zip" "$APP_PATH"

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-macOS
          path: |
            ShopRemote-*.dmg
            ShopRemote-*.zip

  # ──────────────────────────────────────────
  # Step 2-C: Android 빌드
  # ──────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-22.04
    needs: generate-bridge
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bridge 파일 복원
        uses: actions/download-artifact@v4
        with:
          name: bridge-artifact
          path: ./

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: android-build

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Android NDK 설치
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: cargo-ndk 설치
        run: cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}" --locked

      - name: 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: Android APK 빌드
        working-directory: flutter
        run: flutter build apk --release --split-per-abi

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Android
          path: flutter/build/app/outputs/flutter-apk/app-*-release.apk
