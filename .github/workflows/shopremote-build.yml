# ============================================================
# ShopRemote - GitHub Actions 빌드 워크플로우
# Windows(.exe) + macOS(.dmg) + Android(.apk) 자동 빌드
# 수동 실행: Actions 탭 → shopremote-build → Run workflow
# ============================================================

name: ShopRemote Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  CARGO_NDK_VERSION: "3.1.2"
  NDK_VERSION: "r27c"

jobs:
  # ──────────────────────────────────────────
  # Windows 빌드
  # ──────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg 캐시 설정
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: LLVM 설치
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: vcpkg 설치 및 캐시
        uses: johnwason/vcpkg-action@v6
        with:
          pkgs: >
            openssl
            libyuv
            libvpx
          triplet: x64-windows-static
          token: ${{ github.token }}
          github-binarycache: true
          revision: ${{ env.VCPKG_COMMIT_ID }}

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: flutter_rust_bridge 생성
        run: |
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --features "uuid"
          cd flutter && flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output lib/generated_bridge.dart

      - name: Windows 빌드
        working-directory: flutter
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: flutter build windows --release

      - name: 빌드 결과물 압축
        run: |
          Compress-Archive -Path flutter\build\windows\x64\runner\Release\* -DestinationPath ShopRemote-${{ env.VERSION }}-windows-x64.zip

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Windows
          path: ShopRemote-*.zip

  # ──────────────────────────────────────────
  # macOS 빌드
  # ──────────────────────────────────────────
  build-macos:
    name: macOS Build
    runs-on: macos-13
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg 캐시 설정
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 의존성 설치
        run: |
          brew install llvm pkg-config nasm yasm

      - name: vcpkg 설치 및 캐시
        uses: johnwason/vcpkg-action@v6
        with:
          pkgs: >
            openssl
            libyuv
            libvpx
          triplet: x64-osx
          token: ${{ github.token }}
          github-binarycache: true
          revision: ${{ env.VCPKG_COMMIT_ID }}

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: flutter_rust_bridge 생성
        run: |
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --features "uuid"
          cd flutter && flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output lib/generated_bridge.dart

      - name: macOS 빌드
        working-directory: flutter
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: flutter build macos --release

      - name: DMG 패키징
        run: |
          brew install create-dmg
          create-dmg \
            --volname "ShopRemote" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "ShopRemote-${{ env.VERSION }}-macos.dmg" \
            "flutter/build/macos/Build/Products/Release/shopremote.app" \
          || zip -r "ShopRemote-${{ env.VERSION }}-macos.zip" \
            "flutter/build/macos/Build/Products/Release/shopremote.app"

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-macOS
          path: |
            ShopRemote-*.dmg
            ShopRemote-*.zip

  # ──────────────────────────────────────────
  # Android 빌드
  # ──────────────────────────────────────────
  build-android:
    name: Android Build
    runs-on: ubuntu-22.04
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Android NDK 설치
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: ${{ env.NDK_VERSION }}
          add-to-path: true

      - name: cargo-ndk 설치
        run: cargo install cargo-ndk --version "${{ env.CARGO_NDK_VERSION }}"

      - name: 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang cmake

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: flutter_rust_bridge 생성
        run: |
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --features "uuid"
          cd flutter && flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/flutter_ffi.rs --dart-output lib/generated_bridge.dart

      - name: Android APK 빌드
        working-directory: flutter
        run: flutter build apk --release --split-per-abi

      - name: Artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Android
          path: flutter/build/app/outputs/flutter-apk/app-*-release.apk
