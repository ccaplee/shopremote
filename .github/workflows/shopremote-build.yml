# ============================================================
# ShopRemote - GitHub Actions 빌드 워크플로우
# Windows(.exe) + macOS(.dmg) 자동 빌드
# 수동 실행: Actions 탭 → shopremote-build → Run workflow
# ============================================================

name: ShopRemote Build

on:
  workflow_dispatch:  # 수동 실행
  push:
    tags:
      - 'v*'          # v1.0.0 같은 태그 푸시 시 자동 빌드

env:
  RUST_VERSION: "1.75"
  FLUTTER_VERSION: "3.24.5"
  LLVM_VERSION: "15.0.6"
  VCPKG_COMMIT_ID: "120deac3062162151622ca4860575a33844ba10b"
  VERSION: "1.4.6"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  # ──────────────────────────────────────────
  # Windows 빌드
  # ──────────────────────────────────────────
  build-windows:
    name: Windows Build
    runs-on: windows-2022
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: vcpkg 캐시
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-windows-${{ env.VCPKG_COMMIT_ID }}

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-pc-windows-msvc

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: LLVM 설치
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: ${{ env.LLVM_VERSION }}

      - name: vcpkg 설치
        run: |
          cd C:\vcpkg
          git fetch origin ${{ env.VCPKG_COMMIT_ID }}
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          .\bootstrap-vcpkg.bat
          .\vcpkg install --triplet x64-windows-static

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: Flutter bridge 생성
        run: |
          cargo install flutter_rust_bridge_codegen --version "1.80.1" --features "uuid" 2>$null
          Push-Location flutter
          flutter pub get
          Pop-Location
          flutter_rust_bridge_codegen --rust-input src/flutter_ffi.rs --dart-output flutter/lib/generated_bridge.dart

      - name: Windows 빌드
        working-directory: flutter
        run: flutter build windows --release

      - name: 인스톨러 패키징 (NSIS)
        run: |
          choco install nsis -y
          # 빌드 결과물 복사
          New-Item -ItemType Directory -Force -Path installer
          Copy-Item -Recurse flutter\build\windows\x64\runner\Release\* installer\
          # 인스톨러 생성
          makensis /DVERSION=${{ env.VERSION }} installer\ShopRemote.nsi 2>$null || echo "NSIS skip"
          # zip으로 대체
          Compress-Archive -Path installer\* -DestinationPath ShopRemote-${{ env.VERSION }}-windows.zip

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-Windows
          path: |
            ShopRemote-*.zip
            flutter/build/windows/x64/runner/Release/shopremote.exe

  # ──────────────────────────────────────────
  # macOS 빌드
  # ──────────────────────────────────────────
  build-macos:
    name: macOS Build
    runs-on: macos-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rust 설치
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Flutter 설치
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: LLVM + 의존성 설치
        run: |
          brew install llvm pkg-config
          echo "LLVM_HOME=$(brew --prefix llvm)" >> $GITHUB_ENV

      - name: vcpkg 설치
        run: |
          git clone https://github.com/microsoft/vcpkg.git $HOME/vcpkg
          cd $HOME/vcpkg
          git checkout ${{ env.VCPKG_COMMIT_ID }}
          ./bootstrap-vcpkg.sh
          ./vcpkg install

      - name: Flutter 의존성
        working-directory: flutter
        run: flutter pub get

      - name: macOS 빌드
        working-directory: flutter
        run: flutter build macos --release

      - name: DMG 패키징
        run: |
          brew install create-dmg
          create-dmg \
            --volname "ShopRemote" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "ShopRemote-${{ env.VERSION }}.dmg" \
            "flutter/build/macos/Build/Products/Release/shopremote.app" || \
          cp -r flutter/build/macos/Build/Products/Release/shopremote.app . && \
          zip -r ShopRemote-${{ env.VERSION }}-macos.zip shopremote.app

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ShopRemote-macOS
          path: |
            ShopRemote-*.dmg
            ShopRemote-*-macos.zip
